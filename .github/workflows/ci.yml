name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend:
    name: Backend (build / lint / test)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ci_test
          MYSQL_DATABASE: mccbng
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -pci_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create datasource config
        run: |
          echo '{"name":"mccb_mysql","connector":"mysql","url":"","host":"127.0.0.1","port":3306,"user":"root","password":"ci_test","database":"mccbng"}' \
            > back/src/datasources/mccb-mysql.datasource.config.json

      - name: Build
        run: pnpm --filter @mccbng/back build

      - name: Lint
        run: pnpm --filter @mccbng/back lint

      - name: Test
        working-directory: back
        run: node_modules/.bin/lb-mocha --allow-console-logs "dist/__tests__"

  frontend:
    name: Frontend (lint / type-check / build / test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --filter @mccbng/front lint:check

      - name: Type check
        run: pnpm --filter @mccbng/front type-check

      - name: Build
        run: pnpm --filter @mccbng/front build
        env:
          VITE_API_URL: http://localhost:3001

      - name: Test
        run: pnpm --filter @mccbng/front test
